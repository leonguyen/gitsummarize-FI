# fly.toml app configuration file generated for gitsummarize-fi on 2026-05-08T06:45:22Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gitsummarize-fi'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
